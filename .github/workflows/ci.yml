name: Java CI/CD with Maven and Kubernetes

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Build Docker image
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: 1dlvb/async-bank-app
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          tags: ${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
          
          # Create a new context for Kubernetes
          kubectl config set-context Default --cluster=my-cluster --user=my-user --namespace=async-bank-app
          kubectl config use-context Default
          kubectl config current-context
          kubectl config get-contexts

      - name: Create Kubernetes Namespace (if not exists)
        run: |
          kubectl apply -f k8s/deployment.yaml || echo "Namespace already exists."

      - name: Deploy PostgreSQL and Async Bank App
        run: |
          kubectl apply -f k8s/deployment.yaml -n async-bank-app --validate=false
          kubectl rollout status deployment/bank-postgres -n async-bank-app
          kubectl rollout status deployment/async-bank-app -n async-bank-app

      - name: Update App Image in Kubernetes Deployment
        run: |
          kubectl set image deployment/async-bank-app async-bank-app=docker.io/1dlvb/async-bank-app:${{ github.sha }} -n async-bank-app
          kubectl rollout status deployment/async-bank-app -n async-bank-app
