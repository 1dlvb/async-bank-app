name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Build Docker image
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: 1dlvb/async-bank-app
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K8S_SERTIFICATE }}" > ~/.kube/ca.crt
          kubectl config set-cluster kubernetes --certificate-authority=~/.kube/ca.crt --server=https://kubernetes.docker.internal:6443
          kubectl config set-credentials new-open-access --token=${{ secrets.K8S_TOKEN }}
          kubectl config set-context kubernetes --cluster=kubernetes --user=new-open-access
          kubectl config use-context kubernetes

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml --validate=false
          kubectl rollout status deployment/async-bank-app -n default
